# Definimos el grupo de servidores web (upstream = servidores destino)
upstream servidores_web {
    # round-robin por defecto: cada petición va al siguiente servidor
    server web1:80;
    server web2:80;
}

# Servidor que escucha en el puerto 80 (el balanceador)
server {
    listen 80;

    # Habilitar el stub_status para que Prometheus pueda leer métricas de Nginx
    location /nginx_status {
        stub_status on;
        allow all;
    }

    # Todo el tráfico normal se reenvía a los servidores web
    location / {
        proxy_pass http://servidores_web;

        # Cabeceras importantes para que los servidores web sepan el origen real
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
